name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            packages/*/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Lint
        run: bun run lint

  rust:
    name: Rust Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Rust changes
        id: rust-changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - 'packages/engine-rs/**'
              - '.github/workflows/ci.yml'

      - name: Setup Rust toolchain
        if: steps.rust-changes.outputs.rust == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, llvm-tools-preview

      - name: Install cargo-llvm-cov
        if: steps.rust-changes.outputs.rust == 'true'
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache Cargo
        if: steps.rust-changes.outputs.rust == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/engine-rs

      - name: Clippy
        if: steps.rust-changes.outputs.rust == 'true'
        working-directory: packages/engine-rs
        run: cargo clippy --workspace --exclude mk-python -- -D warnings

      - name: Test with coverage
        if: steps.rust-changes.outputs.rust == 'true'
        working-directory: packages/engine-rs
        run: cargo llvm-cov --workspace --exclude mk-python --lcov --output-path lcov.info

      - name: Upload to Codecov
        if: steps.rust-changes.outputs.rust == 'true'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: packages/engine-rs/lcov.info
          fail_ci_if_error: false
