[project]
name = "mage-knight-sdk"
version = "0.2.0"
description = "Python SDK for Mage Knight RL training with native Rust engine"
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "Mage Knight Digital" }]
license = { text = "MIT" }
keywords = ["mage-knight", "sdk", "reinforcement-learning"]
dependencies = []

[project.scripts]
mage-knight-viewer = "mage_knight_sdk.viewer.__main__:main"
mage-knight-run-native = "mage_knight_sdk.cli.run_native:main"
mage-knight-train-rl = "mage_knight_sdk.cli.train_rl:main"
mage-knight-import-tb = "mage_knight_sdk.tools.import_tensorboard:main"

[project.optional-dependencies]
dev = []
viewer = [
  "flask>=3.0",
  "ijson>=3.2",
]
rl = [
  "torch>=2.3",
  "tensorboard>=2.16",
  "setuptools>=60,<67.5",  # tensorboard 2.20 requires pkg_resources; <67.5 avoids deprecation warning, <81 avoids removal
]

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
addopts = "-q"
